name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

      - name: Test
        run: pnpm test

  skills:
    name: Skills
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build skills
        run: pnpm --filter '@daddia/skills' run build

      - name: Lint skills
        run: pnpm --filter '@daddia/skills' run lint

      - name: Check index is up to date
        run: |
          pnpm --filter '@daddia/skills' run generate:index
          if ! git diff --quiet -- packages/skills/space-index/SKILL.md; then
            echo "space-index/SKILL.md is out of date — run 'pnpm --filter @daddia/skills run generate:index' locally and commit"
            exit 1
          fi

      - name: Check views are up to date
        run: |
          pnpm --filter '@daddia/skills' run generate:views
          if ! git diff --quiet -- packages/skills/views; then
            echo "views/*.md are out of date — run 'pnpm --filter @daddia/skills run generate:views' locally and commit"
            exit 1
          fi

  docs:
    name: Docs
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      contains(toJson(github.event.pull_request.changed_files), 'docs/')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Lint docs
        run: node scripts/lint-docs.js

  eval:
    name: Description eval
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      contains(toJson(github.event.pull_request.changed_files), 'packages/skills/')
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      EVAL_THRESHOLD: '0.75'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install anthropic pyyaml

      - name: Run description eval
        run: python scripts/eval-descriptions.py
